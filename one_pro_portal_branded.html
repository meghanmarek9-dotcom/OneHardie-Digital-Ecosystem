<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Pro Portal — James Hardie + TimberTech/AZEK</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --jh-green: #1f5c34;
  --jh-green2: #2d7a4f;
  --jh-green3: #3a9463;
  --jh-light: #edf7f1;
  --jh-mid: #c6e6d2;
  --tt-red: #c0392b;
  --tt-red2: #e74c3c;
  --tt-light: #fdecea;
  --slate: #1e2d3d;
  --slate2: #2c3e50;
  --text: #111827;
  --text2: #374151;
  --text3: #6b7280;
  --text4: #9ca3af;
  --bg: #f7f9f8;
  --bg2: #ffffff;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.13);
  --sidebar-w: 224px;
  --topbar-h: 54px;
  --radius: 8px;
  --radius-lg: 12px;
}
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #dfe6df; min-height: 100vh; }

/* ── DEMO ORCHESTRATION BAR ── */
.demo-bar {
  background: var(--slate);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 0;
  border-bottom: 2px solid var(--jh-green);
  flex-wrap: wrap;
}
.demo-section { display: flex; align-items: center; gap: 8px; padding: 10px 16px 10px 0; border-right: 1px solid rgba(255,255,255,0.1); margin-right: 16px; }
.demo-section:last-child { border-right: none; margin-left: auto; }
.demo-section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
.demo-tabs { display: flex; gap: 3px; }
.demo-tab {
  font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.15); background: transparent;
  color: rgba(255,255,255,0.55); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.demo-tab:hover { background: rgba(255,255,255,0.08); color: #fff; }
.demo-tab.on { background: var(--jh-green); color: #fff; border-color: var(--jh-green3); }
.view-btns { display: flex; gap: 3px; }
.view-btn { font-size: 11px; padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.55); cursor: pointer; transition: all .15s; }
.view-btn:hover { color: #fff; }
.view-btn.on { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.3); }

/* ── CAPABILITY STRIP (shows shared layer) ── */
.cap-strip {
  background: var(--jh-green);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
}
.cap-strip-label { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.45); white-space: nowrap; margin-right: 12px; flex-shrink: 0; }
.cap-pill {
  font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.65);
  padding: 7px 12px; white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.12);
  transition: all .12s; cursor: default; flex-shrink: 0;
}
.cap-pill:last-child { border-right: none; }
.cap-pill.active { color: #fff; background: rgba(255,255,255,0.12); }
.cap-pill-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #4ade80; margin-right: 5px; vertical-align: middle; }

/* ── DEVICE FRAMES ── */
.device-wrap { padding: 14px 20px 20px; display: flex; justify-content: center; }
.device-desktop { width: 100%; max-width: 1120px; background: #2c3e50; border-radius: 10px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
.chrome-bar { background: #3d4f62; padding: 8px 14px; display: flex; align-items: center; gap: 10px; }
.chrome-dots { display: flex; gap: 5px; }
.chrome-dot { width: 10px; height: 10px; border-radius: 50%; }
.chrome-url { flex: 1; background: #2c3e50; border-radius: 5px; padding: 5px 12px; font-size: 11px; color: #9ca3af; font-family: monospace; }
.chrome-lock { font-size: 10px; color: #4ade80; margin-right: 4px; }

.device-mobile { width: 375px; background: #2c3e50; border-radius: 36px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4); border: 7px solid #3d4f62; }
.mobile-notch { background: #1a2535; height: 30px; display: flex; align-items: center; justify-content: center; }
.mobile-pill { width: 72px; height: 7px; background: #2c3e50; border-radius: 999px; }

/* ── PORTAL SHELL ── */
.portal { display: flex; height: 580px; background: var(--bg); overflow: hidden; }
.portal-mobile { height: 660px; flex-direction: column; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: #fff; border-right: 1px solid var(--border2); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.sidebar-logo { padding: 14px 16px 12px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; gap: 9px; }
.logo-icon { width: 30px; height: 30px; background: var(--jh-green); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; }
.logo-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.1; }
.logo-sub  { font-size: 9px; color: var(--text4); font-weight: 400; }
.brand-badges { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 5px; }
.brand-badge { font-size: 9px; font-weight: 600; padding: 3px 8px; border-radius: 4px; letter-spacing: .02em; }
.bb-jh { background: var(--jh-light); color: var(--jh-green); border: 1px solid var(--jh-mid); }
.bb-tt { background: var(--tt-light); color: var(--tt-red); border: 1px solid #f5c6c2; }
.sidebar-user { padding: 10px 16px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.user-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-name { font-size: 12px; font-weight: 600; color: var(--text); }
.user-role { font-size: 10px; color: var(--text3); }
.sidebar-nav { flex: 1; padding: 8px 0; }
.nav-group-label { font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text4); padding: 10px 16px 3px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 7px 16px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all .12s; border-left: 2px solid transparent; }
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--jh-light); color: var(--jh-green); border-left-color: var(--jh-green); font-weight: 500; }
.nav-icon { width: 16px; text-align: center; font-size: 13px; flex-shrink: 0; }
.nav-badge { margin-left: auto; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 999px; }
.nb-red   { background: #fee2e2; color: #dc2626; }
.nb-green { background: var(--jh-light); color: var(--jh-green); }
.nb-gray  { background: #f3f4f6; color: var(--text3); }

/* MAIN AREA */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar { height: var(--topbar-h); background: #fff; border-bottom: 1px solid var(--border2); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; }
.topbar-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
.topbar-greeting { font-size: 12px; color: var(--text3); }
.topbar-right { display: flex; gap: 8px; align-items: center; }
.topbar-icon-btn { width: 32px; height: 32px; border-radius: var(--radius); background: var(--bg); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; position: relative; }
.notif-dot { position: absolute; top: 4px; right: 4px; width: 7px; height: 7px; background: #ef4444; border-radius: 50%; border: 1.5px solid #fff; }
.content-area { flex: 1; overflow-y: auto; padding: 16px 20px; }

/* ── WELCOME BANNER ── */
.welcome-banner { background: linear-gradient(135deg, var(--jh-green) 0%, var(--jh-green2) 60%, #1b4332 100%); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 14px; display: flex; align-items: center; gap: 16px; }
.wb-text { flex: 1; }
.wb-greeting { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 500; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .06em; }
.wb-name    { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 2px; }
.wb-sub     { font-size: 12px; color: rgba(255,255,255,0.65); }
.wb-brands  { display: flex; gap: 6px; margin-top: 8px; }
.wb-brand-tag { font-size: 9px; font-weight: 600; padding: 3px 9px; border-radius: 4px; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.2); }
.wb-tier { text-align: center; background: rgba(255,255,255,0.1); border-radius: var(--radius); padding: 10px 16px; border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; }
.wb-tier-label { font-size: 9px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
.wb-tier-name  { font-size: 14px; font-weight: 800; color: #4ade80; }
.wb-tier-sub   { font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 2px; }

/* ── STAT CARDS ── */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
.stat-card { background: #fff; border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 14px; }
.stat-label { font-size: 10px; color: var(--text3); font-weight: 500; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
.stat-value { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 3px; }
.stat-sub { font-size: 10px; color: var(--text4); }
.stat-change { font-size: 10px; font-weight: 600; }
.up   { color: var(--jh-green2); }
.down { color: #dc2626; }
.stat-bar { height: 3px; border-radius: 999px; margin-top: 8px; }

/* ── LEAD CARDS ── */
.lead-card { background: #fff; border: 1px solid var(--border2); border-radius: var(--radius); padding: 11px 13px; margin-bottom: 7px; cursor: pointer; transition: all .12s; }
.lead-card:hover { border-color: var(--jh-green3); box-shadow: 0 2px 8px rgba(31,92,52,0.1); }
.lead-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
.lead-av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.lead-info { flex: 1; min-width: 0; }
.lead-name-row { display: flex; align-items: center; gap: 7px; margin-bottom: 2px; }
.lead-name { font-size: 13px; font-weight: 600; color: var(--text); }
.lead-temp { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
.temp-hot  { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
.temp-warm { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
.temp-new  { background: var(--jh-light); color: var(--jh-green); border: 1px solid var(--jh-mid); }
.lead-addr { font-size: 11px; color: var(--text3); }
.lead-desc { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.lead-footer { display: flex; align-items: center; gap: 8px; }
.lead-source { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
.src-hover { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.src-web   { background: #f3f4f6; color: var(--text3); border: 1px solid var(--border2); }
.src-ref   { background: var(--jh-light); color: var(--jh-green); border: 1px solid var(--jh-mid); }
.lead-value { margin-left: auto; font-size: 13px; font-weight: 700; color: var(--jh-green); }
.lead-cta { font-size: 10px; font-weight: 600; color: var(--jh-green); margin-left: 8px; cursor: pointer; }

/* ── CAPABILITY HUB WIDGET ── */
.cap-hub { background: #fff; border: 1px solid var(--border2); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 14px; }
.cap-hub-header { background: var(--jh-green); padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
.cap-hub-title { font-size: 11px; font-weight: 700; color: #fff; }
.cap-hub-sub   { font-size: 10px; color: rgba(255,255,255,0.6); }
.cap-hub-badge { margin-left: auto; font-size: 9px; background: rgba(255,255,255,0.2); color: #fff; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
.cap-hub-grid  { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; }
.cap-hub-item  { padding: 11px 12px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.cap-hub-item:hover { background: var(--jh-light); }
.cap-hub-item:nth-child(4n) { border-right: none; }
.cap-hub-item:nth-child(n+5) { border-bottom: none; }
.cap-hub-icon { font-size: 16px; margin-bottom: 5px; }
.cap-hub-name { font-size: 10px; font-weight: 600; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
.cap-hub-avail { font-size: 9px; color: var(--text4); }
.cap-hub-dot-on  { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #4ade80; margin-right: 3px; }
.cap-hub-dot-off { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #d1d5db; margin-right: 3px; }

/* ── MY TOOLS ── */
.tools-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; margin-bottom: 14px; }
.tool-item { background: #fff; border: 1px solid var(--border2); border-radius: var(--radius); padding: 13px 8px; text-align: center; cursor: pointer; transition: all .15s; }
.tool-item:hover { border-color: var(--jh-green3); background: var(--jh-light); box-shadow: 0 2px 8px rgba(31,92,52,0.08); }
.tool-emoji { font-size: 22px; margin-bottom: 6px; }
.tool-name  { font-size: 10px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
.tool-brand { font-size: 9px; color: var(--text4); }

/* ── PROGRAM + REWARDS ── */
.rewards-card { background: #fff; border: 1px solid var(--border2); border-radius: var(--radius); padding: 14px; }
.rc-value { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 4px; }
.rc-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; }
.rc-split { display: flex; gap: 6px; margin-bottom: 10px; }
.rc-brand-pill { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
.rcp-jh { background: var(--jh-light); color: var(--jh-green); border: 1px solid var(--jh-mid); }
.rcp-tt { background: var(--tt-light); color: var(--tt-red); border: 1px solid #f5c6c2; }
.rc-spend-label { font-size: 9px; color: var(--text4); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
.rc-spend-tags  { display: flex; gap: 4px; flex-wrap: wrap; }
.rc-spend-tag   { font-size: 9px; padding: 2px 7px; border-radius: 4px; background: #f3f4f6; color: var(--text3); border: 1px solid var(--border2); }

/* ── INSTALLER: PROJECT PHOTOS ── */
.project-photo { border-radius: var(--radius); overflow: hidden; aspect-ratio: 4/3; position: relative; margin-bottom: 6px; }
.photo-placeholder { width: 100%; height: 100%; display: flex; align-items: flex-end; }
.photo-overlay { background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 50%); padding: 10px; width: 100%; }
.photo-caption { font-size: 10px; color: #fff; font-weight: 500; line-height: 1.3; }
.photo-date { font-size: 9px; color: rgba(255,255,255,0.6); }
.hotline-chip { display: inline-flex; align-items: center; gap: 4px; background: rgba(74,222,128,0.2); border: 1px solid rgba(74,222,128,0.4); border-radius: 999px; padding: 2px 8px; margin-top: 4px; }
.hotline-chip-text { font-size: 9px; color: #4ade80; font-weight: 600; }

/* ── HARDIE HOTLINE CHAT ── */
.hotline-panel { background: #fff; border: 1px solid var(--border2); border-radius: var(--radius-lg); overflow: hidden; }
.hotline-header { background: var(--jh-green); padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
.hotline-icon { width: 28px; height: 28px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.hotline-title { font-size: 12px; font-weight: 700; color: #fff; }
.hotline-status { font-size: 9px; color: rgba(255,255,255,0.6); }
.hotline-status-dot { display: inline-block; width: 6px; height: 6px; background: #4ade80; border-radius: 50%; margin-right: 4px; }
.hotline-body { padding: 12px; }
.hotline-msg { margin-bottom: 8px; display: flex; gap: 7px; }
.hm-user { justify-content: flex-end; }
.hm-bubble { max-width: 85%; font-size: 11px; line-height: 1.5; border-radius: 10px; padding: 8px 11px; }
.hm-q  { background: #f3f4f6; color: var(--text2); border-radius: 10px 10px 2px 10px; }
.hm-a  { background: var(--jh-light); color: var(--jh-green); border-radius: 10px 10px 10px 2px; border: 1px solid var(--jh-mid); }
.hm-ai-av { width: 22px; height: 22px; background: var(--jh-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
.hotline-input { margin-top: 8px; display: flex; gap: 6px; align-items: center; background: #f9fafb; border: 1px solid var(--border2); border-radius: 8px; padding: 7px 10px; }
.hi-text { font-size: 11px; color: var(--text4); flex: 1; }
.hi-actions { display: flex; gap: 6px; }
.hi-btn { font-size: 11px; color: var(--text4); cursor: pointer; }

/* ── TOOLBELT MARKETPLACE ── */
.toolbelt-panel { background: #fff; border: 1px solid var(--border2); border-radius: var(--radius-lg); overflow: hidden; }
.toolbelt-header { background: var(--slate2); padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
.toolbelt-title { font-size: 12px; font-weight: 700; color: #fff; }
.toolbelt-sub { font-size: 10px; color: rgba(255,255,255,0.5); }
.tb-match { background: #fff; border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 12px; margin: 0 12px 8px; }
.tb-match:first-of-type { margin-top: 10px; }
.tb-match-top { display: flex; align-items: center; gap: 9px; margin-bottom: 5px; }
.tb-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.tb-name { font-size: 12px; font-weight: 600; color: var(--text); }
.tb-cert { font-size: 9px; color: var(--jh-green); font-weight: 600; background: var(--jh-light); padding: 1px 6px; border-radius: 3px; }
.tb-detail { font-size: 10px; color: var(--text3); margin-bottom: 5px; }
.tb-footer { display: flex; gap: 6px; align-items: center; }
.tb-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #f3f4f6; color: var(--text3); }
.tb-cta { margin-left: auto; font-size: 10px; font-weight: 600; color: var(--jh-green); background: var(--jh-light); padding: 3px 10px; border-radius: 5px; border: 1px solid var(--jh-mid); cursor: pointer; }

/* ── CO-OP / DEALER ── */
.coop-card { background: #fff; border: 1px solid var(--border2); border-radius: var(--radius); padding: 14px; }
.coop-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.coop-brand-block { border-radius: var(--radius); padding: 10px; }
.coop-bb-jh { background: var(--jh-light); border: 1px solid var(--jh-mid); }
.coop-bb-tt { background: var(--tt-light); border: 1px solid #f5c6c2; }
.coop-brand-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.coop-bb-jh .coop-brand-label { color: var(--jh-green); }
.coop-bb-tt .coop-brand-label { color: var(--tt-red); }
.coop-amount { font-size: 20px; font-weight: 800; }
.coop-bb-jh .coop-amount { color: var(--jh-green); }
.coop-bb-tt .coop-amount { color: var(--tt-red); }
.coop-avail { font-size: 9px; color: var(--text3); }
.prog-bar-bg { background: #f3f4f6; border-radius: 999px; height: 6px; }
.prog-bar-fill { height: 6px; border-radius: 999px; background: var(--jh-green); }
.prog-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text4); margin-top: 4px; }

/* ── ORDER ITEMS ── */
.order-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.order-row:last-child { border-bottom: none; }
.order-id { font-size: 10px; font-weight: 700; color: var(--jh-green); min-width: 62px; }
.order-desc { font-size: 11px; color: var(--text2); flex: 1; }
.order-brand-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.order-amt { font-size: 11px; font-weight: 700; color: var(--text); }
.order-status { font-size: 9px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
.os-transit   { background: #dbeafe; color: #1d4ed8; }
.os-delivered { background: var(--jh-light); color: var(--jh-green); }
.os-pending   { background: #fff7ed; color: #c2410c; }

/* ── CERT ITEMS ── */
.cert-row { display: flex; align-items: center; gap: 9px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.cert-row:last-child { border-bottom: none; }
.cert-icon { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.cert-name { font-size: 11px; font-weight: 500; color: var(--text); flex: 1; }
.cert-brand { font-size: 9px; color: var(--text4); }
.cert-status { font-size: 9px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
.cs-done    { background: var(--jh-light); color: var(--jh-green); }
.cs-prog    { background: #fff7ed; color: #c2410c; }
.cs-locked  { background: #f3f4f6; color: var(--text4); }

/* ── NOTIFICATIONS ── */
.notif-item { display: flex; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.notif-item:last-child { border-bottom: none; }
.nd { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.notif-text { font-size: 11px; color: var(--text2); line-height: 1.5; flex: 1; }
.notif-time { font-size: 10px; color: var(--text4); white-space: nowrap; }

/* ── QUICK ACTIONS ── */
.qa-row { display: flex; gap: 8px; margin-bottom: 14px; }
.qa-btn { flex: 1; background: #fff; border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 6px; text-align: center; cursor: pointer; transition: all .12s; }
.qa-btn:hover { border-color: var(--jh-green3); background: var(--jh-light); }
.qa-icon  { font-size: 16px; margin-bottom: 4px; }
.qa-label { font-size: 10px; font-weight: 500; color: var(--text); }

/* ── SECTION HEADER ── */
.sec-hdr { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.sec-link { font-size: 10px; font-weight: 500; color: var(--jh-green2); cursor: pointer; }
.divider { height: .5px; background: var(--border); margin: 12px 0; }

/* ── GRID HELPERS ── */
.two-col    { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 14px; }
.two-col-eq { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.three-col  { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.card { background: #fff; border: 1px solid var(--border2); border-radius: var(--radius); }
.card-inner { padding: 12px 14px; }

/* ── MOBILE ── */
.mobile-header { background: var(--jh-green); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
.mh-logo-icon { width: 24px; height: 24px; background: rgba(255,255,255,0.2); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; }
.mh-title { font-size: 13px; font-weight: 700; color: #fff; flex: 1; }
.mobile-content { flex: 1; overflow-y: auto; background: var(--bg); padding: 14px; }
.mobile-bottom-nav { background: #fff; border-top: 1px solid var(--border2); display: flex; justify-content: space-around; padding: 8px 0 4px; }
.mbn-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 3px 12px; cursor: pointer; }
.mbn-icon  { font-size: 18px; }
.mbn-label { font-size: 9px; color: var(--text4); }
.mbn-item.active .mbn-label { color: var(--jh-green); font-weight: 700; }

/* ── PROJECT PHOTO PREVIEWS (CSS-based) ── */
.proj-photos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.proj-photo-card { border-radius: var(--radius); overflow: hidden; position: relative; cursor: pointer; }
.proj-photo-card:hover .ppc-overlay { opacity: 1; }
.ppc-bg { height: 90px; position: relative; }
.ppc-siding { background: linear-gradient(135deg, #8b6f47 0%, #a0845c 30%, #c4a882 60%, #8b6f47 100%); }
.ppc-deck   { background: linear-gradient(135deg, #5d4037 0%, #795548 40%, #a1887f 70%, #6d4c41 100%); }
.ppc-trim   { background: linear-gradient(135deg, #eceff1 0%, #cfd8dc 50%, #b0bec5 100%); }
.ppc-install{ background: linear-gradient(135deg, #37474f 0%, #546e7a 40%, #78909c 100%); }
.ppc-lines { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 8px, rgba(0,0,0,0.04) 8px, rgba(0,0,0,0.04) 9px); }
.ppc-overlay { position: absolute; inset: 0; background: rgba(31,92,52,0.85); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; }
.ppc-overlay-text { font-size: 10px; color: #fff; font-weight: 600; text-align: center; padding: 8px; }
.ppc-footer { background: #fff; padding: 7px 9px; border: 1px solid var(--border2); border-top: none; border-radius: 0 0 var(--radius) var(--radius); }
.ppc-addr   { font-size: 10px; font-weight: 600; color: var(--text); }
.ppc-meta   { font-size: 9px; color: var(--text4); margin-top: 1px; }
.ppc-ai-tag { display: inline-flex; align-items: center; gap: 3px; background: var(--jh-light); border: 1px solid var(--jh-mid); border-radius: 3px; padding: 1px 5px; margin-top: 3px; }
.ppc-ai-tag-text { font-size: 9px; color: var(--jh-green); font-weight: 600; }

};

function update() {
  buildCapStrip();
  if (view === 'desktop') {
    buildSidebar();
    buildTopbar();
    document.getElementById('mainContent').innerHTML = renderers[aud]();
    document.getElementById('mainContent').scrollTop = 0;
  } else {
    renderMobile();
  }
}

function switchAud(a, btn) {
  aud = a;
  document.querySelectorAll('.demo-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  update();
}

function switchView(v, btn) {
  view = v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('desktopWrap').style.display = v==='desktop'?'':'none';
  document.getElementById('mobileWrap').style.display  = v==='mobile' ?'':'none';
  update();
}

update();
</script>
